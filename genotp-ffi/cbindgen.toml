# cbindgen configuration for genotp-ffi.
# Header is regenerated at build time by build.rs. To regenerate manually:
#   cargo build -p genotp-ffi
# To opt out (e.g. for hermetic builds): GENOTP_FFI_SKIP_CBINDGEN=1.

language = "C"

# cbindgen auto-adds the includes it needs (stdint.h, stdbool.h, stdlib.h,
# stddef.h, stdarg.h) based on emitted types. Don't double-declare here.
no_includes = false

# Top of generated header.
header = """/* SPDX-License-Identifier: MIT
 *
 * genotp FFI — C bindings for the Rust `genotp` library.
 *
 * AUTO-GENERATED by cbindgen. Do NOT edit manually — regenerate by
 * running `cargo build -p genotp-ffi`. The source of truth is
 * `genotp-ffi/src/lib.rs`.
 *
 * Memory ownership rules:
 *   - Opaque handles (GenOtpHotp*, GenOtpTotp*, ...) are heap-allocated by
 *     constructors and MUST be freed exactly once via their *_free fn.
 *   - GenOtpString and GenOtpBytes returned by this library MUST be freed
 *     via genotp_string_free / genotp_bytes_free.
 *   - Strings are LENGTH-PREFIXED, **NOT null-terminated**.
 *       OK:   printf("%.*s", (int)s.len, s.data);
 *       UB:   printf("%s", s.data);
 *   - Empty results return data=NULL, len=0. Calling free on those is a no-op.
 *
 * Thread safety:
 *   - HOTP/TOTP/Verifier/Context/SkewDetector are safe to share across
 *     threads via `const` pointer (their methods take &self internally).
 *   - Do NOT call *_free concurrently with any other use of the same pointer.
 */"""

include_guard = "GENOTP_H"
cpp_compat = true
pragma_once = false

# Documentation from Rust doc-comments.
documentation = true
documentation_style = "c"

# Layout.
style = "type"
line_length = 100
tab_width = 4

[export]
# Declaration ordering in the generated header.
item_types = [
    "constants",
    "globals",
    "enums",
    "structs",
    "opaque",
    "typedefs",
    "functions",
]

[enum]
# Namespace variants with the enum type name. Output e.g.:
#   GenOtpErrorCode_Success, GenOtpErrorCode_InvalidSecret
#   GenOtpAlgorithm_Sha1, GenOtpAlgorithm_Sha256
# Without this, variants pollute the global C namespace (bare `Success`,
# `Sha1`, etc.) and can collide with user code.
prefix_with_name = true
derive_helper_methods = false

[fn]
args = "auto"
sort_by = "None"

[parse]
parse_deps = false
# Expand macros so cbindgen sees `#[unsafe(no_mangle)]` correctly under
# Rust 2024 edition. Without this, fn declarations are silently skipped.
expand = ["genotp-ffi"]
